<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 850px;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            border: 3px solid #ffd966;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 1.6rem;
            color: #ff6f61;
            text-shadow: 1.5px 1.5px 0 #ffd966;
            line-height: 1.2;
        }

        .mode-switch {
            display: flex;
            gap: 5px;
            margin: 5px 0;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 0;
            font-size: 1rem;
            border: none;
            border-radius: 40px;
            background: #e0e0e0;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 3px 0 #999;
            touch-action: manipulation;
        }

        .mode-btn.active {
            background: #ff6f61;
            color: white;
            border-color: #ffd966;
            box-shadow: 0 3px 0 #b3412e;
        }

        .mode-btn:last-child.active {
            background: #4CAF50;
            box-shadow: 0 3px 0 #2d6a4f;
        }

        .sound-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 3px 0 5px;
            background: rgba(75, 123, 236, 0.1);
            padding: 4px 8px;
            border-radius: 30px;
        }

        .sound-toggle {
            background: #4b7bec;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid #ffd966;
            box-shadow: 0 2px 0 #2c3e50;
            touch-action: manipulation;
        }

        .sound-toggle:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #2c3e50;
        }

        .sound-status {
            font-size: 0.8rem;
            color: #4b7bec;
            background: white;
            padding: 3px 10px;
            border-radius: 30px;
            border: 1px solid #4b7bec;
        }

        .loading {
            font-size: 0.8rem;
            color: #4b7bec;
            margin: 2px 0;
            text-align: center;
        }

        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 2px 0 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* Режим 1 - Алфавит */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 3px;
            padding: 3px;
            background: #f0f0f0;
            border-radius: 12px;
        }

        .letter-card {
            background: white;
            border: 2px solid #4b7bec;
            border-radius: 10px;
            padding: 6px 0;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 3px 0 #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            touch-action: manipulation;
        }

        .letter-card.speaking {
            background: #b7e4c7;
            border-color: #2d6a4f;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2c3e50;
        }

        .sound-indicator {
            font-size: 0.6rem;
            margin-top: 1px;
            color: #666;
        }

        .letter-card.vowel {
            border-color: #fc5c65;
            background: linear-gradient(145deg, #fff0f0, #ffe0e0);
        }

        .info-panel {
            background: #f7d794;
            border-radius: 30px;
            padding: 8px;
            margin-top: 6px;
            border: 2px solid #f19066;
        }

        .selected-info {
            font-size: 1.1rem;
        }

        .selected-info span {
            font-weight: bold;
            color: #e84118;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin: 3px 0;
            border: 2px solid #e84118;
            font-size: 1.3rem;
        }

        .example-word {
            font-size: 1.3rem;
            background: #ffb8b8;
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
            border: 2px solid #b33939;
        }

        /* Режим 2 - Викторина (ЭМОДЗИ ПО ЦЕНТРУ) */
        .quiz-container {
            background: #f7d794;
            border-radius: 30px;
            padding: 10px;
            border: 2px solid #f19066;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .quiz-question {
            font-size: 1.3rem;
            background: white;
            padding: 8px;
            border-radius: 40px;
            border: 2px solid #e84118;
            text-align: center; /* Текст по центру */
        }

        .quiz-image {
            font-size: 4rem; /* Увеличил размер эмодзи */
            margin: 10px auto; /* auto по бокам для центрирования */
            background: #ffeaa5;
            padding: 15px;
            border-radius: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: fit-content; /* Ширина по содержимому */
            min-width: 100px; /* Минимальная ширина */
            box-shadow: 0 4px 0 #e67e22;
            border: 2px solid #f39c12;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
        }

        .quiz-option {
            background: white;
            padding: 12px;
            font-size: 1.8rem;
            font-weight: bold;
            border: 3px solid #4b7bec;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2c3e50;
            touch-action: manipulation;
            text-align: center; /* Текст по центру */
        }

        .quiz-option:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2c3e50;
        }

        .quiz-option.correct {
            background: #b7e4c7;
            border-color: #2d6a4f;
            box-shadow: 0 4px 0 #1b4332;
        }

        .quiz-option.wrong {
            background: #ffb3b3;
            border-color: #b3412e;
            box-shadow: 0 4px 0 #7f2b1d;
        }

        .quiz-option.disabled {
            opacity: 0.8;
            pointer-events: none;
        }

        .quiz-feedback {
            font-size: 1.2rem;
            margin: 5px 0;
            min-height: 40px;
            text-align: center; /* По центру */
            font-weight: bold;
        }

        .quiz-next {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #2d6a4f;
            width: 100%;
            max-width: 200px;
            margin: 5px auto; /* auto для центрирования */
            display: block;
        }

        .score {
            font-size: 1.2rem;
            background: #4b7bec;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 5px auto; /* auto для центрирования */
            font-weight: bold;
            text-align: center;
        }

        .footer {
            font-size: 0.8rem;
            color: #555;
            margin-top: 4px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔤 АБВГДейка 🔤</h1>
        </div>

        <div class="mode-switch">
            <button id="mode1Btn" class="mode-btn active">📖 Учим</button>
            <button id="mode2Btn" class="mode-btn">🎮 Угадай</button>
        </div>

        <div class="sound-row">
            <button id="soundToggle" class="sound-toggle">🔊 Вкл</button>
            <span id="soundStatus" class="sound-status">✅ Звук есть</span>
        </div>

        <div id="loadingIndicator" class="loading">⏳ Загрузка звуков...</div>
        <div id="progressBar" class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>

        <!-- Основное содержимое -->
        <div class="main-content">
            <!-- Режим 1: Алфавит -->
            <div id="mode1" class="game-area" style="height: 100%; display: flex; flex-direction: column;">
                <div id="alphabetGrid" class="alphabet-grid"></div>

                <div class="info-panel">
                    <div class="selected-info">
                        Буква: <span id="selectedLetter">А</span>
                    </div>
                    <div id="exampleWord" class="example-word">
                        🍉 Арбуз 🍉
                    </div>
                </div>
            </div>

            <!-- Режим 2: Викторина -->
            <div id="mode2" class="game-area hidden" style="height: 100%;">
                <div class="quiz-container">
                    <div class="quiz-question" id="questionText">Какая буква?</div>
                    
                    <!-- Эмодзи теперь по центру -->
                    <div style="display: flex; justify-content: center; width: 100%;">
                        <div id="quizImage" class="quiz-image">❓</div>
                    </div>
                    
                    <div id="quizOptions" class="quiz-options"></div>

                    <div id="quizFeedback" class="quiz-feedback">👆 Выбери букву</div>
                    
                    <button id="nextQuestionBtn" class="quiz-next hidden">➡️ Дальше</button>
                    
                    <div style="display: flex; justify-content: center;">
                        <div id="scoreDisplay" class="score">⭐ 0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        const alphabetData = {
            'А': ['Арбуз', '🍉'], 'Б': ['Барабан', '🥁'], 'В': ['Велосипед', '🚲'],
            'Г': ['Гриб', '🍄'], 'Д': ['Дом', '🏠'], 'Е': ['Енот', '🦝'],
            'Ё': ['Ёжик', '🦔'], 'Ж': ['Жук', '🐞'], 'З': ['Зайка', '🐇'],
            'И': ['Индюк', '🦃'], 'Й': ['Йогурт', '🥛'], 'К': ['Кошка', '🐱'],
            'Л': ['Лиса', '🦊'], 'М': ['Медведь', '🐻'], 'Н': ['Носорог', '🦏'],
            'О': ['Обезьяна', '🐒'], 'П': ['Пингвин', '🐧'], 'Р': ['Рыба', '🐟'],
            'С': ['Сова', '🦉'], 'Т': ['Тигр', '🐯'], 'У': ['Улитка', '🐌'],
            'Ф': ['Фламинго', '🦩'], 'Х': ['Хомяк', '🐹'], 'Ц': ['Цыпленок', '🐥'],
            'Ч': ['Черепаха', '🐢'], 'Ш': ['Шарик', '🎈'], 'Щ': ['Щенок', '🐕'],
            'Ъ': ['Подъезд', '🚪'], 'Ы': ['Сыр', '🧀'], 'Ь': ['Лось', 'Y'],
            'Э': ['Эскимо', '🍦'], 'Ю': ['Юла', '🪀'], 'Я': ['Яблоко', '🍎']
        };

        const letters = Object.keys(alphabetData);
        const vowels = ['А','Е','Ё','И','О','У','Ы','Э','Ю','Я'];

        // ========== ЗВУКИ С МАЛЕНЬКИМИ БУКВАМИ ==========
        const letterSoundFiles = {
            'А': 'sounds/а.mp3', 'Б': 'sounds/б.mp3', 'В': 'sounds/в.mp3',
            'Г': 'sounds/г.mp3', 'Д': 'sounds/д.mp3', 'Е': 'sounds/е.mp3',
            'Ё': 'sounds/ё.mp3', 'Ж': 'sounds/ж.mp3', 'З': 'sounds/з.mp3',
            'И': 'sounds/и.mp3', 'Й': 'sounds/й.mp3', 'К': 'sounds/к.mp3',
            'Л': 'sounds/л.mp3', 'М': 'sounds/м.mp3', 'Н': 'sounds/н.mp3',
            'О': 'sounds/о.mp3', 'П': 'sounds/п.mp3', 'Р': 'sounds/р.mp3',
            'С': 'sounds/с.mp3', 'Т': 'sounds/т.mp3', 'У': 'sounds/у.mp3',
            'Ф': 'sounds/ф.mp3', 'Х': 'sounds/х.mp3', 'Ц': 'sounds/ц.mp3',
            'Ч': 'sounds/ч.mp3', 'Ш': 'sounds/ш.mp3', 'Щ': 'sounds/щ.mp3',
            'Ъ': 'sounds/ъ.mp3', 'Ы': 'sounds/ы.mp3', 'Ь': 'sounds/ь.mp3',
            'Э': 'sounds/э.mp3', 'Ю': 'sounds/ю.mp3', 'Я': 'sounds/я.mp3'
        };

        const quizSoundFiles = {
            'correct': 'sounds/правильно.mp3',
            'wrong': 'sounds/неправильно.mp3'
        };

        // ========== ПРЕДЗАГРУЗКА ==========
        const preloadedAudios = {};
        let totalSounds = 0;
        let loadedSounds = 0;

        const loadingIndicator = document.getElementById('loadingIndicator');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        function preloadSound(key, path) {
            return new Promise((resolve) => {
                if (!path) {
                    loadedSounds++;
                    updateProgress();
                    resolve();
                    return;
                }
                
                const audio = new Audio();
                audio.addEventListener('canplaythrough', () => {
                    preloadedAudios[key] = audio;
                    loadedSounds++;
                    updateProgress();
                    resolve();
                }, { once: true });
                
                audio.addEventListener('error', () => {
                    loadedSounds++;
                    updateProgress();
                    resolve();
                });
                
                audio.preload = 'auto';
                audio.src = path;
                audio.load();
            });
        }

        function updateProgress() {
            const percent = (loadedSounds / totalSounds) * 100;
            progressFill.style.width = percent + '%';
            
            if (loadedSounds === totalSounds) {
                loadingIndicator.textContent = '✅ Готово!';
                setTimeout(() => {
                    loadingIndicator.style.opacity = '0';
                    progressBar.style.opacity = '0';
                }, 1000);
            } else {
                loadingIndicator.textContent = `⏳ Загрузка: ${loadedSounds}/${totalSounds}`;
            }
        }

        async function preloadAllSounds() {
            const allSounds = [];
            
            Object.entries(letterSoundFiles).forEach(([key, path]) => {
                if (path) allSounds.push({ key: `letter_${key}`, path });
            });
            
            Object.entries(quizSoundFiles).forEach(([key, path]) => {
                if (path) allSounds.push({ key: `quiz_${key}`, path });
            });
            
            totalSounds = allSounds.length;
            progressBar.style.display = 'block';
            
            await Promise.all(allSounds.map(sound => preloadSound(sound.key, sound.path)));
        }

        function playPreloadedSound(key) {
            if (!soundEnabled) return;
            const audio = preloadedAudios[key];
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            }
        }

        function playLetterSound(letter) {
            if (currentMode !== 1) return;
            playPreloadedSound(`letter_${letter}`);
        }

        function playQuizSound(type) {
            if (currentMode !== 2) return;
            playPreloadedSound(`quiz_${type}`);
        }

        // ========== ЭЛЕМЕНТЫ ==========
        const grid = document.getElementById('alphabetGrid');
        const selectedLetterSpan = document.getElementById('selectedLetter');
        const exampleWordDiv = document.getElementById('exampleWord');
        const mode1 = document.getElementById('mode1');
        const mode2 = document.getElementById('mode2');
        const mode1Btn = document.getElementById('mode1Btn');
        const mode2Btn = document.getElementById('mode2Btn');
        const soundToggle = document.getElementById('soundToggle');
        const soundStatus = document.getElementById('soundStatus');
        const quizOptions = document.getElementById('quizOptions');
        const quizFeedback = document.getElementById('quizFeedback');
        const nextBtn = document.getElementById('nextQuestionBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const quizImage = document.getElementById('quizImage');
        const questionText = document.getElementById('questionText');

        let soundEnabled = true;
        let currentMode = 1;
        let currentCorrectLetter = '';
        let score = 0;
        let canAnswer = true;

        // Управление звуком
        soundToggle.addEventListener('click', (e) => {
            e.preventDefault();
            soundEnabled = !soundEnabled;
            soundToggle.textContent = soundEnabled ? '🔊 Вкл' : '🔇 Выкл';
            soundStatus.textContent = soundEnabled ? '✅ Звук есть' : '🔇 Нет звука';
            soundStatus.style.color = soundEnabled ? '#4CAF50' : '#999';
        });

        // Режим 1
        function updateSelectedInfo(letter) {
            selectedLetterSpan.textContent = letter;
            const [word, emoji] = alphabetData[letter] || ['???', '❓'];
            exampleWordDiv.innerHTML = `${emoji} ${word} ${emoji}`;
            playLetterSound(letter);
            highlightSpeakingLetter(letter);
        }

        function highlightSpeakingLetter(letter) {
            document.querySelectorAll('.letter-card').forEach(card => {
                card.classList.remove('speaking');
                if (card.textContent.trim().startsWith(letter)) {
                    card.classList.add('speaking');
                    setTimeout(() => card.classList.remove('speaking'), 400);
                }
            });
        }

        // Создаем буквы
        letters.forEach(letter => {
            const card = document.createElement('div');
            card.className = 'letter-card';
            if (vowels.includes(letter)) card.classList.add('vowel');
            card.innerHTML = `${letter}<span class="sound-indicator">🔊</span>`;
            
            card.addEventListener('click', () => {
                if (currentMode === 1) {
                    updateSelectedInfo(letter);
                    card.style.transform = 'translateY(3px)';
                    card.style.boxShadow = '0 1px 0 #2c3e50';
                    setTimeout(() => {
                        card.style.transform = '';
                        card.style.boxShadow = '0 3px 0 #2c3e50';
                    }, 100);
                }
            });
            grid.appendChild(card);
        });

        // Режим 2
        function getRandomLetters(exclude, count) {
            const available = letters.filter(l => l !== exclude);
            const result = [];
            while (result.length < count && available.length > 0) {
                const letter = available[Math.floor(Math.random() * available.length)];
                if (!result.includes(letter)) result.push(letter);
            }
            return result;
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function newQuestion() {
            currentCorrectLetter = letters[Math.floor(Math.random() * letters.length)];
            const [word, emoji] = alphabetData[currentCorrectLetter];
            
            quizImage.textContent = emoji;
            questionText.innerHTML = `❓ ${word}`;
            
            const options = shuffleArray([currentCorrectLetter, ...getRandomLetters(currentCorrectLetter, 2)]);
            
            quizOptions.innerHTML = '';
            options.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = letter;
                
                btn.addEventListener('click', () => {
                    if (!canAnswer) return;
                    canAnswer = false;
                    
                    if (letter === currentCorrectLetter) {
                        playQuizSound('correct');
                        btn.classList.add('correct');
                        quizFeedback.innerHTML = '✅ Правильно! Молодец!';
                        score++;
                        scoreDisplay.textContent = `⭐ ${score}`;
                    } else {
                        playQuizSound('wrong');
                        btn.classList.add('wrong');
                        quizFeedback.innerHTML = `❌ Это буква ${currentCorrectLetter}`;
                        
                        document.querySelectorAll('.quiz-option').forEach(b => {
                            if (b.textContent === currentCorrectLetter) {
                                b.classList.add('correct');
                            }
                        });
                    }
                    
                    document.querySelectorAll('.quiz-option').forEach(b => {
                        b.disabled = true;
                        b.classList.add('disabled');
                    });
                    
                    nextBtn.classList.remove('hidden');
                });
                
                quizOptions.appendChild(btn);
            });
            
            nextBtn.classList.add('hidden');
            quizFeedback.innerHTML = '👆 Выбери букву';
            canAnswer = true;
        }

        nextBtn.addEventListener('click', () => {
            newQuestion();
        });

        // Переключение режимов
        mode1Btn.addEventListener('click', () => {
            currentMode = 1;
            mode1.classList.remove('hidden');
            mode2.classList.add('hidden');
            mode1Btn.classList.add('active');
            mode2Btn.classList.remove('active');
        });

        mode2Btn.addEventListener('click', () => {
            currentMode = 2;
            mode1.classList.add('hidden');
            mode2.classList.remove('hidden');
            mode1Btn.classList.remove('active');
            mode2Btn.classList.add('active');
            score = 0;
            scoreDisplay.textContent = '⭐ 0';
            newQuestion();
        });

        // Запуск
        window.addEventListener('load', () => {
            preloadAllSounds();
            updateSelectedInfo('А');
        });
    </script>
</body>
</html>
