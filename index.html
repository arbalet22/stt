<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Учим алфавит - Говорящие буквы</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            padding: 15px 12px;
            text-align: center;
            border: 4px solid #ffd966;
        }

        h1 {
            font-size: 2.2rem;
            color: #ff6f61;
            text-shadow: 2px 2px 0 #ffd966;
            margin-bottom: 5px;
        }

        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        .mode-btn {
            padding: 14px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 60px;
            background: #e0e0e0;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
            box-shadow: 0 5px 0 #999;
            flex: 1;
            min-width: 130px;
            touch-action: manipulation;
        }

        .mode-btn.active {
            background: #4CAF50;
            color: white;
            border-color: #ffd966;
            box-shadow: 0 5px 0 #2d6a4f;
        }

        .mode-btn:first-child.active {
            background: #ff6f61;
            box-shadow: 0 5px 0 #b3412e;
        }

        .sound-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .sound-toggle {
            background: #4b7bec;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 15px;
            font-size: 1.1rem;
            cursor: pointer;
            border: 2px solid #ffd966;
            box-shadow: 0 3px 0 #2c3e50;
            touch-action: manipulation;
        }

        .sound-toggle:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #2c3e50;
        }

        .sound-status {
            font-size: 1rem;
            color: #4b7bec;
            background: white;
            padding: 5px 15px;
            border-radius: 30px;
            border: 2px solid #4b7bec;
        }

        /* Режим 1 - Алфавит */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
            padding: 5px;
        }

        .letter-card {
            background: #fff;
            border: 3px solid #4b7bec;
            border-radius: 18px;
            padding: 15px 2px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            touch-action: manipulation;
            position: relative;
        }

        .letter-card.speaking {
            background: #b7e4c7;
            border-color: #2d6a4f;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #2c3e50;
        }

        .sound-indicator {
            font-size: 0.8rem;
            margin-top: 2px;
            color: #666;
        }

        .letter-card:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2c3e50;
        }

        .letter-card.vowel {
            border-color: #fc5c65;
            background: linear-gradient(145deg, #fff0f0, #ffe0e0);
        }

        /* Режим 2 - Викторина */
        .quiz-container {
            background: #f7d794;
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            border: 3px solid #f19066;
        }

        .quiz-question {
            font-size: 1.8rem;
            margin-bottom: 15px;
            background: white;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #e84118;
        }

        .quiz-image {
            font-size: 4rem;
            margin: 10px 0;
            background: #ffeaa5;
            padding: 15px;
            border-radius: 80px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .quiz-option {
            background: white;
            padding: 18px 15px;
            font-size: 2.2rem;
            font-weight: bold;
            border: 4px solid #4b7bec;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0 #2c3e50;
            text-transform: uppercase;
            touch-action: manipulation;
            width: 100%;
        }

        .quiz-option:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2c3e50;
        }

        .quiz-option.correct {
            background: #b7e4c7;
            border-color: #2d6a4f;
            box-shadow: 0 6px 0 #1b4332;
        }

        .quiz-option.wrong {
            background: #ffb3b3;
            border-color: #b3412e;
            box-shadow: 0 6px 0 #7f2b1d;
        }

        .quiz-option.disabled {
            opacity: 0.8;
            pointer-events: none;
        }

        .quiz-feedback {
            font-size: 1.5rem;
            margin: 15px 0;
            min-height: 60px;
        }

        .quiz-next {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #2d6a4f;
            transition: all 0.1s;
            width: 100%;
            max-width: 280px;
            margin: 5px auto;
            touch-action: manipulation;
        }

        .quiz-next:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2d6a4f;
        }

        .quiz-next.hidden {
            display: none;
        }

        .score {
            font-size: 1.4rem;
            background: #4b7bec;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 12px;
            font-weight: bold;
        }

        .info-panel {
            background: #f7d794;
            border-radius: 50px;
            padding: 15px;
            margin: 15px 0;
            border: 3px solid #f19066;
        }

        .selected-info {
            font-size: 1.5rem;
            color: #3d3d3d;
        }

        .selected-info span {
            font-weight: bold;
            color: #e84118;
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 8px 0;
            border: 3px solid #e84118;
            font-size: 2rem;
        }

        .example-word {
            font-size: 1.8rem;
            color: #1e272e;
            background: #ffb8b8;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
            margin-top: 8px;
            border: 3px solid #b33939;
        }

        footer {
            margin-top: 12px;
            font-size: 1rem;
            color: #555;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 380px) {
            h1 { font-size: 1.8rem; }
            .letter-card { font-size: 1.8rem; }
            .mode-btn { font-size: 1rem; padding: 12px 10px; min-width: 110px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔤 АБВГДейка 🔤</h1>
        
        <div class="mode-switch">
            <button id="mode1Btn" class="mode-btn active">📖 Учим буквы</button>
            <button id="mode2Btn" class="mode-btn">🎮 Угадай букву</button>
        </div>

        <div class="sound-controls">
            <button id="soundToggle" class="sound-toggle">🔊 Звук вкл</button>
            <span id="soundStatus" class="sound-status">✅ Звук работает</span>
        </div>

        <!-- Режим 1: Алфавит (ПОЛНАЯ ОЗВУЧКА БУКВ) -->
        <div id="mode1" class="game-area">
            <div id="alphabetGrid" class="alphabet-grid"></div>

            <div class="info-panel">
                <div class="selected-info">
                    Буква: <span id="selectedLetter">-</span>
                </div>
                <div id="exampleContainer">
                    <div class="example-word" id="exampleWord">
                        👆 Нажми на букву!
                    </div>
                </div>
            </div>
        </div>

        <!-- Режим 2: Викторина (ТОЛЬКО ЗВУКИ ПРАВИЛЬНО/НЕПРАВИЛЬНО) -->
        <div id="mode2" class="game-area hidden">
            <div class="quiz-container">
                <div class="quiz-question" id="questionText">Какая буква?</div>
                <div id="quizImage" class="quiz-image">❓</div>
                
                <div id="quizOptions" class="quiz-options"></div>

                <div id="quizFeedback" class="quiz-feedback">👆 Выбери ответ</div>
                
                <button id="nextQuestionBtn" class="quiz-next hidden">➡️ Дальше</button>
                
                <div id="scoreDisplay" class="score">⭐ 0</div>
            </div>
        </div>

        
        </footer>
    </div>

    <script>
        // Словарь с буквами
        const alphabetData = {
            'А': ['Арбуз', '🍉'], 'Б': ['Барабан', '🥁'], 'В': ['Велосипед', '🚲'],
            'Г': ['Гриб', '🍄'], 'Д': ['Дом', '🏠'], 'Е': ['Енот', '🦝'],
            'Ё': ['Ёжик', '🦔'], 'Ж': ['Жук', '🐞'], 'З': ['Зайка', '🐇'],
            'И': ['Индюк', '🦃'], 'Й': ['Йогурт', '🥛'], 'К': ['Кошка', '🐱'],
            'Л': ['Лиса', '🦊'], 'М': ['Медведь', '🐻'], 'Н': ['Носорог', '🦏'],
            'О': ['Обезьяна', '🐒'], 'П': ['Пингвин', '🐧'], 'Р': ['Рыба', '🐟'],
            'С': ['Сова', '🦉'], 'Т': ['Тигр', '🐯'], 'У': ['Улитка', '🐌'],
            'Ф': ['Фламинго', '🦩'], 'Х': ['Хомяк', '🐹'], 'Ц': ['Цыпленок', '🐥'],
            'Ч': ['Черепаха', '🐢'], 'Ш': ['Шарик', '🎈'], 'Щ': ['Щенок', '🐕'],
            'Ъ': ['Подъезд', '🚪'], 'Ы': ['Сыр', '🧀'], 'Ь': ['Лось', '🦌'],
            'Э': ['Эскимо', '🍦'], 'Ю': ['Юла', '🪀'], 'Я': ['Яблоко', '🍎']
        };

        const letters = Object.keys(alphabetData);
        const vowels = ['А','Е','Ё','И','О','У','Ы','Э','Ю','Я'];

        // ========== НАСТРОЙКА ЗВУКОВ С РУССКИМИ НАЗВАНИЯМИ ==========
        // Пути к звукам букв в русской раскладке (для режима 1)
        const letterSoundFiles = {
            'А': 'sounds/а.mp3',    // обрати внимание: русская А
            'Б': 'sounds/б.mp3',
            'В': 'sounds/в.mp3',
            'Г': 'sounds/Г.mp3',
            'Д': 'sounds/Д.mp3',
            'Е': 'sounds/Е.mp3',
            'Ё': 'sounds/Ё.mp3',
            'Ж': 'sounds/Ж.mp3',
            'З': 'sounds/З.mp3',
            'И': 'sounds/И.mp3',
            'Й': 'sounds/Й.mp3',
            'К': 'sounds/К.mp3',
            'Л': 'sounds/Л.mp3',
            'М': 'sounds/М.mp3',
            'Н': 'sounds/Н.mp3',
            'О': 'sounds/О.mp3',
            'П': 'sounds/П.mp3',
            'Р': 'sounds/Р.mp3',
            'С': 'sounds/С.mp3',
            'Т': 'sounds/Т.mp3',
            'У': 'sounds/У.mp3',
            'Ф': 'sounds/Ф.mp3',
            'Х': 'sounds/Х.mp3',
            'Ц': 'sounds/Ц.mp3',
            'Ч': 'sounds/Ч.mp3',
            'Ш': 'sounds/Ш.mp3',
            'Щ': 'sounds/Щ.mp3',
            'Ъ': 'sounds/Ъ.mp3',
            'Ы': 'sounds/Ы.mp3',
            'Ь': 'sounds/Ь.mp3',
            'Э': 'sounds/Э.mp3',
            'Ю': 'sounds/Ю.mp3',
            'Я': 'sounds/Я.mp3'
        };

        // Звуки для викторины (режим 2) - тоже могут быть с русскими названиями
        const quizSoundFiles = {
            'correct': 'sounds/правильно.mp3',  // или correct.mp3 - как у вас названо
            'wrong': 'sounds/неправильно.mp3'    // или wrong.mp3 - как у вас названо
        };

        // Хранилище для аудио объектов
        const audioCache = {};
        
        // Состояние звука
        let soundEnabled = true;
        
        // Текущий режим
        let currentMode = 1; // 1 - обучение, 2 - викторина

        // Функция для проверки существования файла (опционально)
        function checkSoundExists(soundPath) {
            // Эта функция просто пробует загрузить звук
            // Если файла нет, браузер выдаст ошибку в консоль, но игра продолжит работать
            return true;
        }

        // Функция воспроизведения звука (общая)
        function playSound(soundPath) {
            if (!soundEnabled || !soundPath) return;
            
            console.log('Пробуем воспроизвести:', soundPath); // для отладки
            
            if (audioCache[soundPath]) {
                audioCache[soundPath].currentTime = 0;
                audioCache[soundPath].play().catch(e => console.log('Не удалось воспроизвести (возможно нет файла):', soundPath));
            } else {
                const audio = new Audio(soundPath);
                audio.play().catch(e => console.log('Не удалось воспроизвести (возможно нет файла):', soundPath));
                audioCache[soundPath] = audio;
            }
        }

        // Функция воспроизведения звука буквы (ТОЛЬКО для режима 1)
        function playLetterSound(letter) {
            if (currentMode !== 1) return; // Звуки букв ТОЛЬКО в режиме 1
            if (!soundEnabled) return;
            
            const soundPath = letterSoundFiles[letter];
            if (soundPath) {
                playSound(soundPath);
            }
        }

        // Функция воспроизведения звука викторины (режим 2)
        function playQuizSound(type) {
            if (currentMode !== 2) return; // Звуки викторины ТОЛЬКО в режиме 2
            if (!soundEnabled) return;
            
            const soundPath = quizSoundFiles[type];
            if (soundPath) {
                playSound(soundPath);
            }
        }

        // Элементы
        const grid = document.getElementById('alphabetGrid');
        const selectedLetterSpan = document.getElementById('selectedLetter');
        const exampleWordDiv = document.getElementById('exampleWord');
        const mode1 = document.getElementById('mode1');
        const mode2 = document.getElementById('mode2');
        const mode1Btn = document.getElementById('mode1Btn');
        const mode2Btn = document.getElementById('mode2Btn');
        const soundToggle = document.getElementById('soundToggle');
        const soundStatus = document.getElementById('soundStatus');
        
        // Элементы викторины
        const quizOptions = document.getElementById('quizOptions');
        const quizFeedback = document.getElementById('quizFeedback');
        const nextBtn = document.getElementById('nextQuestionBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const quizImage = document.getElementById('quizImage');
        const questionText = document.getElementById('questionText');

        // Переменные викторины
        let currentCorrectLetter = '';
        let score = 0;
        let canAnswer = true;

        // ========== УПРАВЛЕНИЕ ЗВУКОМ ==========
        soundToggle.addEventListener('click', (e) => {
            e.preventDefault();
            soundEnabled = !soundEnabled;
            
            if (soundEnabled) {
                soundToggle.textContent = '🔊 Звук вкл';
                soundStatus.textContent = '✅ Звук работает';
                soundStatus.style.color = '#4CAF50';
            } else {
                soundToggle.textContent = '🔇 Звук выкл';
                soundStatus.textContent = '🔇 Звук отключен';
                soundStatus.style.color = '#999';
            }
        });

        // ========== РЕЖИМ 1: АЛФАВИТ (ПОЛНАЯ ОЗВУЧКА) ==========
        function updateSelectedInfo(letter) {
            selectedLetterSpan.textContent = letter;
            if (alphabetData[letter]) {
                const [word, emoji] = alphabetData[letter];
                exampleWordDiv.innerHTML = `${emoji} ${word} ${emoji}`;
            }
            
            // В режиме 1 проигрываем звук буквы
            playLetterSound(letter);
            
            // Визуальный эффект "говорящей" буквы
            highlightSpeakingLetter(letter);
        }

        function highlightSpeakingLetter(letter) {
            document.querySelectorAll('.letter-card').forEach(card => {
                card.classList.remove('speaking');
            });
            
            document.querySelectorAll('.letter-card').forEach(card => {
                if (card.textContent.trim() === letter) {
                    card.classList.add('speaking');
                    setTimeout(() => {
                        card.classList.remove('speaking');
                    }, 500);
                }
            });
        }

        // Создаем буквы
        letters.forEach(letter => {
            const card = document.createElement('div');
            card.className = 'letter-card';
            if (vowels.includes(letter)) {
                card.classList.add('vowel');
            }
            
            card.innerHTML = `${letter}<span class="sound-indicator">🔊</span>`;
            
            card.addEventListener('click', (e) => {
                e.preventDefault();
                if (currentMode === 1) {
                    updateSelectedInfo(letter);
                    
                    card.style.transform = 'translateY(4px)';
                    card.style.boxShadow = '0 1px 0 #2c3e50';
                    setTimeout(() => {
                        card.style.transform = '';
                        card.style.boxShadow = '0 5px 0 #2c3e50';
                    }, 120);
                }
            });
            grid.appendChild(card);
        });

        // ========== РЕЖИМ 2: ВИКТОРИНА (ТОЛЬКО ЗВУКИ ОТВЕТОВ) ==========
        function getRandomLetters(exclude, count) {
            const available = letters.filter(l => l !== exclude);
            const result = [];
            while (result.length < count && available.length > 0) {
                const randomIndex = Math.floor(Math.random() * available.length);
                const letter = available[randomIndex];
                if (!result.includes(letter)) {
                    result.push(letter);
                }
            }
            return result;
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function newQuestion() {
            const randomIndex = Math.floor(Math.random() * letters.length);
            currentCorrectLetter = letters[randomIndex];
            
            const [word, emoji] = alphabetData[currentCorrectLetter];
            quizImage.textContent = emoji || '🔤';
            questionText.innerHTML = `❓ ${word}`;
            
            const wrongLetters = getRandomLetters(currentCorrectLetter, 2);
            let options = [currentCorrectLetter, ...wrongLetters];
            options = shuffleArray(options);
            
            quizOptions.innerHTML = '';
            options.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = letter;
                
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (!canAnswer) return;
                    
                    canAnswer = false;
                    
                    if (letter === currentCorrectLetter) {
                        // Правильный ответ - звук correct
                        playQuizSound('correct');
                        
                        btn.classList.add('correct');
                        quizFeedback.innerHTML = '✅ Правильно! Молодец! ⭐';
                        score += 1;
                        scoreDisplay.textContent = `⭐ ${score}`;
                        
                        document.querySelectorAll('.quiz-option').forEach(b => {
                            b.disabled = true;
                            b.classList.add('disabled');
                        });
                    } else {
                        // Неправильный ответ - звук wrong
                        playQuizSound('wrong');
                        
                        btn.classList.add('wrong');
                        quizFeedback.innerHTML = `❌ Неправильно. Это буква ${currentCorrectLetter}!`;
                        
                        document.querySelectorAll('.quiz-option').forEach(b => {
                            b.disabled = true;
                            b.classList.add('disabled');
                            if (b.textContent === currentCorrectLetter) {
                                b.classList.add('correct');
                            }
                        });
                    }
                    
                    nextBtn.classList.remove('hidden');
                });
                
                quizOptions.appendChild(btn);
            });
            
            nextBtn.classList.add('hidden');
            quizFeedback.innerHTML = '👆 Выбери букву';
            canAnswer = true;
        }

        nextBtn.addEventListener('click', (e) => {
            e.preventDefault();
            newQuestion();
        });

        // ========== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ==========
        mode1Btn.addEventListener('click', (e) => {
            e.preventDefault();
            currentMode = 1;
            mode1.classList.remove('hidden');
            mode2.classList.add('hidden');
            mode1Btn.classList.add('active');
            mode2Btn.classList.remove('active');
        });

        mode2Btn.addEventListener('click', (e) => {
            e.preventDefault();
            currentMode = 2;
            mode1.classList.add('hidden');
            mode2.classList.remove('hidden');
            mode1Btn.classList.remove('active');
            mode2Btn.classList.add('active');
            
            score = 0;
            scoreDisplay.textContent = '⭐ 0';
            newQuestion();
        });

        // Начальная буква
        updateSelectedInfo('А');

        // Выводим в консоль список ожидаемых файлов для проверки
        console.log('Ожидаемые файлы букв:', letterSoundFiles);
        console.log('Ожидаемые файлы викторины:', quizSoundFiles);
    </script>
</body>
</html>
